name: 金融资讯定时推送

on:
  # 每天9点（北京时间）运行
  schedule:
    - cron: '0 9 * * *'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  run-daily-notification:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 创建日志目录
        run: |
          mkdir -p /tmp/app/work/logs/bypass
          mkdir -p logs

      - name: 运行推送脚本
        env:
          COZE_WORKSPACE_PATH: ${{ github.workspace }}
          COZE_WORKLOAD_IDENTITY_API_KEY: ${{ secrets.COZE_API_KEY }}
          COZE_INTEGRATION_MODEL_BASE_URL: ${{ secrets.COZE_BASE_URL }}
        run: |
          python scripts/daily_notification.py

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notification-log-${{ github.run_number }}
          path: logs/daily_notification.log
          retention-days: 7
